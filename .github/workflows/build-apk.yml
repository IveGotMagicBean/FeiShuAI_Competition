name: Build TWA APK

# 在云端 ubuntu runner 上跑 bubblewrap：
#   - 本地 WSL2 跑不了：DNS 污染 + node fetch 不走系统代理
#   - runner 在国外，能直连 *.workers.dev + 自动下载 Android SDK / gradle deps
#
# 触发方式：
#   1. push tag v*  →  build 完直接 attach 到对应 Release
#   2. workflow_dispatch + release_tag 输入  →  attach 到指定 Release（用于补 apk 到旧 release）
#   3. workflow_dispatch 不填 tag  →  只产 workflow artifact

on:
  push:
    tags: ['v*']
    # 改动 mobile 资产或本 workflow 自身时也自动重 build（避免要等下个 release tag）
    branches: ['main']
    paths:
      - '.github/workflows/build-apk.yml'
      - 'mobile/**'
      - 'website/manifest.webmanifest'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '已存在的 Release tag (e.g. v0.3.0) — 把 .apk attach 上去。留空只产 artifact。'
        required: false
        default: ''

permissions:
  contents: write     # 上传 release asset

jobs:
  build:
    name: Bubblewrap TWA build
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 第一次跑会下 gradle deps / android build-tools，给足时间

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 预装 Android SDK + build-tools，避免 bubblewrap 自己下 ~500MB
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-33 build-tools;33.0.2'

      - name: Install expect + bubblewrap CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y expect
          npm install -g @bubblewrap/cli@latest
          which bubblewrap
          bubblewrap --version || true

      # 关键：预创建 bubblewrap 配置，告诉它 JDK/SDK 在哪
      # 这样 init 就不会问"要不要装 JDK"，省 5-10 分钟
      - name: Pre-configure bubblewrap (skip JDK/SDK download prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          echo '--- ~/.bubblewrap/config.json ---'
          cat ~/.bubblewrap/config.json
          echo '--- JAVA_HOME ---'
          ls -la "$JAVA_HOME" | head -5
          echo '--- ANDROID_SDK_ROOT ---'
          ls -la "$ANDROID_SDK_ROOT" | head -10

      - name: Decode signing keystore from secret
        working-directory: mobile
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::Secret ANDROID_KEYSTORE_B64 is empty — 没设或拼错"
            exit 1
          fi
          printf '%s' "$KEYSTORE_B64" | base64 -d > android.keystore
          ls -lh android.keystore
          test -s android.keystore || { echo "::error::keystore 解码后为空"; exit 1; }

      - name: Run bubblewrap init (expect-driven, auto-answer prompts)
        working-directory: mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 先跑 doctor 看看 bubblewrap 认不认我们预设的 JDK/SDK
          echo '=== bubblewrap doctor (诊断 JDK/SDK 配置) ==='
          bubblewrap doctor 2>&1 || echo "(doctor 报错，继续)"
          echo '=== /end doctor ==='

          cat > /tmp/init.exp <<'EXPECT_EOF'
          #!/usr/bin/expect -f
          log_user 1
          # 把整个 expect session dump 到文件，失败时方便定位
          log_file -a /tmp/init-session.log
          # 600s = 10min：JDK/SDK 已预装，init 主要是回答 manifest 配置问题 + 生成 gradle 项目
          set timeout 600
          set kpw $env(KEYSTORE_PASSWORD)
          set keypw $env(KEY_PASSWORD)

          spawn -noecho bubblewrap init --manifest=https://sentinel-mcp.542058929.workers.dev/manifest.webmanifest

          expect {
            # ---- Android SDK license 还可能弹（即使 SDK 路径已设置）----
            -re {Do you accept.*[Ll]icense}                { send -- "Y\r"; exp_continue }
            -re {[Aa]ccept.*license}                       { send -- "Y\r"; exp_continue }

            # ---- manifest 相关 ----
            -re {[Aa]pplication ID}              { send -- "dev.sentinelmcp.twa\r"; exp_continue }
            -re {[Ss]tarting version code}       { send -- "3\r"; exp_continue }
            -re {[Pp]ath to.*[Kk]eystore}        { send -- "./android.keystore\r"; exp_continue }
            -re {[Kk]ey alias}                   { send -- "android\r"; exp_continue }
            -re {[Kk]eystore.*password}          { send -- "$kpw\r"; exp_continue }
            -re {[Kk]ey password}                { send -- "$keypw\r"; exp_continue }
            -re {[Uu]se existing.*signing key}   { send -- "Y\r"; exp_continue }
            -re {[Gg]enerate.*new signing key}   { send -- "N\r"; exp_continue }
            -re {[Pp]ush [Dd]elegation}          { send -- "Y\r"; exp_continue }
            -re {[Ss]kip PWA [Qq]uality}         { send -- "Y\r"; exp_continue }
            -re {Domain being opened}            { send -- "\r"; exp_continue }
            -re {Name of the application}        { send -- "\r"; exp_continue }
            -re {launcher}                       { send -- "\r"; exp_continue }
            -re {Display mode}                   { send -- "\r"; exp_continue }
            -re {Orientation}                    { send -- "\r"; exp_continue }
            -re {Status bar color}               { send -- "\r"; exp_continue }
            -re {[Ss]plash screen color}         { send -- "\r"; exp_continue }
            -re {Icon URL}                       { send -- "\r"; exp_continue }
            -re {Maskable icon}                  { send -- "\r"; exp_continue }
            -re {Monochrome icon}                { send -- "\r"; exp_continue }

            # ---- catch-all：碰到没识别的 (Y/n) / (y/N) 默认走推荐选项 ----
            -re {\(Y/n\)}                        { send -- "Y\r"; exp_continue }
            -re {\(y/N\)}                        { send -- "N\r"; exp_continue }

            timeout {
              puts "\n\n==== TIMEOUT — bubblewrap init 卡住，未匹配到下一个 prompt ===="
              exit 2
            }
            eof {}
          }

          set r [wait]
          set ec [lindex $r 3]
          puts "\nbubblewrap init exited with $ec"
          exit $ec
          EXPECT_EOF
          chmod +x /tmp/init.exp
          # 失败也不立刻退，先把 session log dump 出来再 exit
          /tmp/init.exp
          rc=$?
          if [ $rc -ne 0 ]; then
            echo ""
            echo "============================================"
            echo "==== bubblewrap init FAILED rc=$rc ===="
            echo "==== /tmp/init-session.log 末 200 行 ===="
            echo "============================================"
            tail -n 200 /tmp/init-session.log 2>/dev/null || echo "(no session log)"

            # 也写到 GitHub Step Summary —— 这样会显示在 run 页面最顶部，不需要展开步骤
            {
              echo "## ❌ bubblewrap init 失败 (rc=$rc)"
              echo ""
              echo "### init session log (末 100 行)"
              echo '```'
              tail -n 100 /tmp/init-session.log 2>/dev/null || echo "(no session log)"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            exit $rc
          fi

      - name: Override generated twa-manifest.json with our prepared template
        working-directory: mobile
        run: |
          # init 生成的 manifest 字段不一定跟我们想要的完全一致（packageId/launcherName/colors 等）
          # 用仓库里的 .template（已检入，权威版本）强制覆盖
          cp twa-manifest.json.template twa-manifest.json
          echo '--- final twa-manifest.json ---'
          cat twa-manifest.json

      - name: Bubblewrap update (sync manifest changes into Android project)
        working-directory: mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > /tmp/update.exp <<'EXPECT_EOF'
          #!/usr/bin/expect -f
          log_user 1
          set timeout 900
          spawn -noecho bubblewrap update
          expect {
            -re {[Kk]eystore.*[Pp]assword} { send -- "$env(KEYSTORE_PASSWORD)\r"; exp_continue }
            -re {[Kk]ey [Pp]assword}       { send -- "$env(KEY_PASSWORD)\r"; exp_continue }
            -re {[Pp]assword}              { send -- "$env(KEYSTORE_PASSWORD)\r"; exp_continue }
            -re {\(Y/n\)}                  { send -- "Y\r"; exp_continue }
            -re {\(y/N\)}                  { send -- "N\r"; exp_continue }
            timeout                        { puts "\n==== UPDATE TIMEOUT ===="; exit 2 }
            eof {}
          }
          set r [wait]
          exit [lindex $r 3]
          EXPECT_EOF
          chmod +x /tmp/update.exp
          # update 失败不致命：build 阶段也会自动同步
          /tmp/update.exp || echo "::warning::bubblewrap update 返回非零，继续 build"

      - name: Bubblewrap build (compile + sign APK)
        working-directory: mobile
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > /tmp/build.exp <<'EXPECT_EOF'
          #!/usr/bin/expect -f
          log_user 1
          set timeout 1500
          spawn -noecho bubblewrap build --skipPwaValidation
          expect {
            -re {[Kk]eystore.*[Pp]assword} { send -- "$env(KEYSTORE_PASSWORD)\r"; exp_continue }
            -re {[Kk]ey [Pp]assword}       { send -- "$env(KEY_PASSWORD)\r"; exp_continue }
            -re {[Pp]assword}              { send -- "$env(KEYSTORE_PASSWORD)\r"; exp_continue }
            timeout                        { puts "\n==== BUILD TIMEOUT ===="; exit 2 }
            eof {}
          }
          set r [wait]
          exit [lindex $r 3]
          EXPECT_EOF
          chmod +x /tmp/build.exp
          /tmp/build.exp
          echo "--- build outputs ---"
          ls -lh *.apk *.aab 2>/dev/null || true

      - name: Rename APK with version tag
        working-directory: mobile
        run: |
          TAG=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="manual-$(date +%Y%m%d-%H%M)"
          fi
          echo "Using tag: $TAG"

          if [ -f app-release-signed.apk ]; then
            mv app-release-signed.apk "Sentinel-MCP-${TAG}.apk"
          elif [ -f app-release.apk ]; then
            mv app-release.apk "Sentinel-MCP-${TAG}.apk"
          fi
          ls -lh *.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-mcp-apk
          path: mobile/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: mobile/*.apk
          fail_on_unmatched_files: true

      - name: Upload debug bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bubblewrap-debug
          path: |
            mobile/twa-manifest.json
            mobile/build.gradle
            mobile/app/build.gradle
            mobile/gradle/wrapper/gradle-wrapper.properties
            mobile/.bubblewrap/
            /tmp/init-session.log
            /tmp/init.exp
          if-no-files-found: ignore
