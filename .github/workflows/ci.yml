name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .

  test:
    name: Test · Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install package + dashboard extras
        run: pip install -e ".[dashboard]"
      - name: Proxy unit tests
        run: python tests/test_proxy.py
      - name: ASK_USER e2e
        run: python tests/test_ask_user_e2e.py
      - name: cat-upstream smoke
        run: python tests/test_e2e_smoke.py
      - name: L4 outbound DLP
        run: python tests/test_dlp_outbound.py
      - name: Web Push manager
        run: python tests/test_push.py
      - name: Desktop entry
        run: python tests/test_desktop.py

  attack-regression:
    name: Attack regression (53 cases)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dashboard]"
      - name: Run all 53 attack cases
        run: python -m tests.attack_cases.run_all
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attack-report
          path: |
            data/attack_report.md
            data/attack_report.json

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
